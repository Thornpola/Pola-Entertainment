<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pola Entertainment</title>
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* The Blurry Background Layer */
        .bg-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://th.bing.com/th/id/OIP.UifcbZWTBNb1mgcN_sysGwHaEK?pid=ImgDetMain') no-repeat center center;
            background-size: cover;
            filter: blur(70px); /* This provides that 70% deep blur effect */
            transform: scale(1.2); /* Prevents white edges caused by blur */
            z-index: -1;
        }

        /* Optional Overlay to darken the blur */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        header {
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading-box {
            text-align: center;
            padding: 4rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .bar-container {
            width: 250px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 25px auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            transition: width 3.5s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        #actionBtn {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            display: inline-block;
            margin-top: 1rem;
            padding: 15px 45px;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: 2px;
            border-radius: 50px;
            pointer-events: none;
        }

        #actionBtn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        footer {
            padding: 1.5rem 4rem;
            background: var(--glass);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <div class="overlay"></div>

    <header>
        <div class="logo">Pola Entertainment</div>
        <div style="font-size: 0.7rem; color: var(--accent);">SECURE LINE ACTIVE</div>
    </header>

    <main>
        <div class="loading-box">
            <p id="loadText" style="letter-spacing: 5px; font-size: 0.8rem;">SYNCING CORE...</p>
            <div class="bar-container">
                <div id="progress" class="bar-progress"></div>
            </div>
            <a href="home.html" id="actionBtn">សូស្វាគមន៍មកកាន់ថ្នាក់រៀន</a>
        </div>
    </main>

    <footer>
        <div>© 2026 SAMLEY.WEB</div>
        <div>V.4.0.0_STABLE</div>
    </footer>

    <script>
        window.onload = () => {
            document.getElementById('progress').style.width = '100%';
            setTimeout(() => {
                document.getElementById('loadText').innerText = "CONNECTION READY";
                document.getElementById('actionBtn').classList.add('visible');
            }, 3800);
        };
    </script>
</body>
</html>
